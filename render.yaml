services:
  - type: web
    name: csv-to-pdf-telegram-bot
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: PORT
        value: 10000
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
